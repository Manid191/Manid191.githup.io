<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Power Plant Feasibility</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Styles -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="logo-area">
                <i class="fa-solid fa-bolt-lightning logo-icon"></i>
                <span class="logo-text">Feasibility<span class="highlight">Pro</span></span>
            </div>

            <nav class="nav-links">
                <a href="#" class="nav-item active" data-view="dashboard">
                    <i class="fa-solid fa-chart-pie"></i>
                    <span>Dashboard</span>
                </a>
                <a href="#" class="nav-item" data-view="inputs">
                    <i class="fa-solid fa-sliders"></i>
                    <span>Parameters</span>
                </a>
                <a href="#" class="nav-item" data-view="financials">
                    <i class="fa-solid fa-file-invoice-dollar"></i>
                    <span>Financials</span>
                </a>
                <a href="#" class="nav-item" data-view="report">
                    <i class="fa-solid fa-print"></i>
                    <span>Report</span>
                </a>

                <div class="sidebar-divider"></div>
                <!-- System Check Removed for Production -->
            </nav>

            <div class="user-profile">
                <div class="user-avatar">AD</div>
                <div class="user-info">
                    <span class="user-name">Admin User</span>
                    <span class="user-role">Project Manager</span>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <div class="page-title">
                    <h1 id="page-header">Dashboard</h1>
                    <p class="subtitle">Overview of your power plant feasibility study</p>
                </div>
                <div class="actions">
                    <button class="btn btn-primary">
                        <i class="fa-solid fa-plus"></i> New Project
                    </button>
                    <button class="btn btn-secondary">
                        <i class="fa-solid fa-download"></i> Export
                    </button>
                </div>
            </header>

            <div id="content-area" class="content-body">
                <!-- Content will be injected here via JS -->
                <div class="placeholder-state">
                    <i class="fa-solid fa-chart-column"></i>
                    <h2>Welcome to FeasibilityPro</h2>
                    <p>Start by configuring your plant parameters.</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="storage.js?v=1.0"></script>
    <script src="calculator.js?v=1.0"></script>
    <script src="input_manager.js?v=1.0"></script>
    <script src="dashboard.js?v=1.0"></script>
    <script src="report_manager.js?v=1.0"></script>
    <script src="financial_manager.js?v=1.0"></script>
    <script src="test_runner.js?v=1.0"></script>
    <script src="app.js?v=1.0"></script>
</body>

</html>
